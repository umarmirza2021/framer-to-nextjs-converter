# Required runtime env vars (Netlify UI → Site settings → Environment variables):
#   DATABASE_URL  — PostgreSQL connection string (Neon: https://neon.tech)
#   AUTH_SECRET   — openssl rand -base64 32
#   AUTH_URL      — https://your-site.netlify.app

[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Conversion APIs — max timeout on Netlify Pro
[functions."*"]
  timeout = 60